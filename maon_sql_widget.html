<!-- MAon SQL Explorer — embeddable widget. Trigger: MAonSQL.open() -->
<style id="maon-sql-style">
#maon-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:9000;align-items:center;justify-content:center}
#maon-overlay.open{display:flex}
#maon-panel{background:#fff;border:1px solid #999;width:min(92vw,1020px);height:min(88vh,700px);display:flex;flex-direction:column;font-family:inherit;font-size:13px;color:#000;box-shadow:0 4px 20px rgba(0,0,0,.25)}
#maon-titlebar{background:#eee;border-bottom:1px solid #999;padding:6px 12px;display:flex;align-items:center;gap:10px;flex-shrink:0}
#maon-close{margin-left:auto;background:none;border:1px solid #aaa;cursor:pointer;font-size:13px;padding:2px 9px;color:#333;font-family:inherit}
#maon-close:hover{background:#ddd}
#maon-tabs{display:flex;border-bottom:1px solid #ccc;background:#f5f5f5;flex-shrink:0}
.maon-tab{padding:5px 14px;font-size:12px;cursor:pointer;border:none;border-right:1px solid #ccc;background:none;color:#444;font-family:inherit}
.maon-tab:hover{background:#eaeaea}
.maon-tab.active{background:#fff;border-bottom:2px solid #000;color:#000;font-weight:bold}
.maon-view{display:none;flex:1;overflow:hidden;flex-direction:column}
.maon-view.active{display:flex}
#maon-editor-area{border-bottom:1px solid #ccc;padding:8px 10px 7px;background:#fafafa;flex-shrink:0}
#maon-sql-input{width:100%;font-family:monospace;font-size:13px;border:1px solid #bbb;padding:5px 7px;resize:vertical;min-height:80px;background:#fff;color:#000;outline:none;line-height:1.5;box-sizing:border-box}
#maon-sql-input:focus{border-color:#555}
#maon-editor-actions{display:flex;align-items:center;gap:8px;margin-top:6px}
#maon-editor-actions button{font-family:inherit;font-size:12px;padding:3px 12px;cursor:pointer;border:1px solid #999;background:#f0f0f0;color:#000}
#maon-editor-actions button:hover{background:#e0e0e0}
.maon-hint{font-size:11px;color:#777;margin-left:auto}
.maon-hint kbd{border:1px solid #bbb;padding:0 4px;font-size:10px;background:#f5f5f5}
#maon-results{flex:1;overflow:auto;padding:8px 10px}
.maon-results-meta{font-size:11px;color:#555;margin-bottom:6px}
.maon-error{font-family:monospace;font-size:12px;color:#900;background:#fff5f5;border:1px solid #f00;padding:7px 10px}
.maon-table-wrap{overflow-x:auto}
.maon-table{border-collapse:collapse;font-size:12px;min-width:100%}
.maon-table th{border:1px solid #ccc;padding:4px 9px;text-align:left;background:#f0f0f0;white-space:nowrap;font-size:11px;text-transform:uppercase;letter-spacing:.04em}
.maon-table td{border:1px solid #ddd;padding:3px 9px;vertical-align:top;max-width:320px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.maon-table tr:nth-child(even) td{background:#fafafa}
.maon-table tr:hover td{background:#f0f0f0}
.maon-null{color:#aaa;font-style:italic}
.maon-tag{display:inline-block;border:1px solid #aaa;padding:0 5px;font-size:10px;margin:1px;cursor:pointer;background:#f5f5f5}
.maon-tag:hover{background:#ddd}
.maon-zh{font-family:"Noto Sans TC","MS JhengHei","PingFang TC",sans-serif}
#maon-tpl-inner{padding:10px;overflow-y:auto;flex:1}
#maon-tpl-inner h4{font-size:12px;text-transform:uppercase;letter-spacing:.06em;color:#555;margin:14px 0 6px;border-bottom:1px solid #ddd;padding-bottom:3px}
#maon-tpl-inner h4:first-child{margin-top:0}
.maon-tpl-btn{display:block;width:100%;text-align:left;padding:4px 8px;font-family:inherit;font-size:12px;background:none;border:none;cursor:pointer;color:#000;border-bottom:1px solid #eee}
.maon-tpl-btn:hover{background:#f0f0f0}
.maon-tpl-btn::before{content:"▶  ";font-size:9px;color:#888}
#maon-schema-inner{padding:10px;overflow-y:auto;flex:1;font-size:12px}
#maon-schema-inner h3{font-size:13px;margin:16px 0 6px;border-bottom:1px solid #ccc;padding-bottom:3px}
#maon-schema-inner h3:first-child{margin-top:0}
.maon-stbl{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:6px}
.maon-stbl th{background:#f0f0f0;border:1px solid #ddd;padding:3px 8px;text-align:left;white-space:nowrap;font-weight:bold}
.maon-stbl td{border:1px solid #ddd;padding:3px 8px;vertical-align:top}
.maon-stbl td:first-child,.maon-stbl td:nth-child(2){font-family:monospace;white-space:nowrap}
#maon-help-inner{padding:14px 16px;overflow-y:auto;flex:1;font-size:13px;line-height:1.6}
#maon-help-inner h3{font-size:13px;font-weight:bold;margin:18px 0 6px;border-bottom:1px solid #ddd;padding-bottom:3px}
#maon-help-inner h3:first-child{margin-top:0}
#maon-help-inner p{margin:0 0 8px}
#maon-help-inner code{font-family:monospace;font-size:12px;background:#f0f0f0;padding:1px 4px}
#maon-help-inner pre{font-family:monospace;font-size:12px;background:#f5f5f5;border:1px solid #ddd;padding:8px 10px;margin:6px 0 10px;overflow-x:auto;line-height:1.5}
#maon-statusbar{border-top:1px solid #ccc;background:#f5f5f5;padding:3px 10px;font-size:11px;color:#666;flex-shrink:0;display:flex;gap:16px}
</style>
<div id="maon-overlay" role="dialog" aria-modal="true">
  <div id="maon-panel">
    <div id="maon-titlebar">
      <strong>MAon SQL Explorer</strong>
      <span style="font-family:monospace;font-size:11px;color:#555">mao: https://purl.org/maont/ontology/</span>
      <button id="maon-close" onclick="MAonSQL.close()">&#x2715; Close</button>
    </div>
    <div id="maon-tabs">
      <button class="maon-tab active" onclick="MAonSQL.tab('query')">SQL Query</button>
      <button class="maon-tab" onclick="MAonSQL.tab('templates')">Templates</button>
      <button class="maon-tab" onclick="MAonSQL.tab('schema')">Schema</button>
      <button class="maon-tab" onclick="MAonSQL.tab('help')">Help</button>
    </div>
    <div class="maon-view active" id="maon-view-query">
      <div id="maon-editor-area">
        <textarea id="maon-sql-input" spellcheck="false">SELECT id, name_en, name_zh, primary_class
FROM individuals
LIMIT 30;</textarea>
        <div id="maon-editor-actions">
          <button onclick="MAonSQL.run()">&#9654; Run</button>
          <button onclick="document.getElementById('maon-sql-input').value=''">Clear</button>
          <span class="maon-hint"><kbd>Ctrl</kbd>+<kbd>Enter</kbd></span>
        </div>
      </div>
      <div id="maon-results"><div style="color:#888;font-size:12px;padding:10px 0">Run a query above. Tables: individuals &middot; classes &middot; object_properties &middot; relations</div></div>
    </div>
    
    <div class="maon-view" id="maon-view-tpl"><div id="maon-tpl-inner"></div></div>
    <div class="maon-view" id="maon-view-schema"><div id="maon-schema-inner"></div></div>
    <div class="maon-view" id="maon-view-help"><div id="maon-help-inner"></div></div>
    <div id="maon-statusbar">
      <span id="maon-stat-ind">&#8212;</span>
      <span id="maon-stat-cls">&#8212;</span>
      <span id="maon-stat-prop">&#8212;</span>
      <span id="maon-stat-rel">&#8212;</span>
    </div>
  </div>
</div>
<script>
(function(){
const _D={"classes":[{"id":"Digital_document","label":"Digital_document","comment":"A born-digital or digitised document resource associated with a martial arts entity, such as a video recording, digital image, or electronic text. ","name_en":"Digital document","parent_class":"E31_document"},{"id":"E21_Person","label":"E21.Person","comment":"A human individual, aligned with CIDOC-CRM E21 Person. In MAon, this is the superclass of MA_Master. Use MA_Master for known martial arts practitioners. Use E21_Person only for peripheral figures such as family members or historical persons who are not martial artists themselves."},{"id":"E22_man_made_obj","label":"E22.Man-made Object","comment":"A CRM stub for CIDOC-CRM E22 Man-Made Object. In MAon, superclass of training_tool. Represents physical artefacts intentionally created by human agency."},{"id":"E31_document","label":"E31.Document","comment":"A CRM stub for CIDOC-CRM E31 Document. In MAon, superclass of MA_book and Digital_document. Represents information objects that serve as records or sources."},{"id":"E41_appellation","label":"E41.Appellation","comment":"A CRM stub for CIDOC-CRM E41 Appellation. Represents names and appellations used to identify entities such as masters, styles, and institutes."},{"id":"E52_timespan","label":"E52.Time-Span","comment":"A CRM stub for CIDOC-CRM E52 Time-Span. Used to record the temporal extent of a master's life or a style's active period."},{"id":"E53_place","label":"E53.Place","comment":"A geographic or administrative location, aligned with CIDOC-CRM E53 Place. Used to record birthplaces, origin places, and transmission locations of styles, systems, and masters."},{"id":"E5_Event","label":"E5.Event","comment":"This class comprises distinct, delimited and coherent processes and interactions of a material nature, in cultural, social or physical systems. Typical examples are meetings, births, deaths, actions of decision taking, making or inventing things, but also more complex and extended ones such as conferences, elections, building of a castle, or battles."},{"id":"E73_Information_Object","label":"E73.Information Object","comment":"A CRM stub for CIDOC-CRM E73 Information Object. In MAon, superclass of MA_principle, MA_verse, MA_syllabus, and training_method. Represents immaterial, conceptual content that can be transmitted and instantiated."},{"id":"E74_Group","label":"E74.Group","comment":"This class comprises any gatherings or organizations of human individuals or groups that act collectively or in a similar way due to any form of unifying relationship. In the wider sense this class also comprises official positions which used to be regarded in certain contexts as one actor, independent of the current holder of the office, such as the president of a country. In such cases, it may happen that the group never had more than one member. A joint pseudonym (i.e. a name that seems indicative of an individual but that is actually used as a persona by two or more people) is a particular case of E74 Group.\nA gathering of people becomes an instance of E74 Group when it exhibits organizational characteristics usually typified by a set of ideas or beliefs held in common, or actions performed together. These might be communication, creating some common artifact, a common purpose such as study, worship, business, sports, etc. Nationality can be modelled as membership in an instance of E74 Group. Married couples and other concepts of family are regarded as particular examples of E74 Group."},{"id":"E77_persistent_item","label":"E77.Persistent Item","comment":"A CRM stub for CIDOC-CRM E77 Persistent Item. In MAon, superclass of symbolic_animal. Represents entities that maintain identity over time."},{"id":"E78_Collection","label":"E78.Collection","comment":"This class comprises aggregations of instances of E18 Physical Thing that are assembled and maintained (“curated” and “preserved,” in museological terminology) by one or more instances of E39 Actor over time for a specific purpose and audience, and according to a particular collection development plan. Typical instances of curated holdings are museum collections, archives, library holdings and digital libraries."},{"id":"Exhibition","label":"Exhibition","comment":"A public event in which martial arts forms, techniques, or historical artefacts are displayed or performed for an audience. Subclass of E5.Event.","name_en":"Exhibition","name_zh":"展覽","parent_class":"E5_Event"},{"id":"Form_move","label":"Form_movement","comment":"The class Form_movement encapsulates the concept of shi. Shi signifies the individual units of movement within a training form, which is a fundamental aspect of technical and stylistic training in traditional martial arts. Examples of this class include zhaoshi (or shi) in Chinese terminology. An instance of form movement, whether static or dynamic, is a choreographed pattern of movement comprising a unitary sequence of basic techniques. It typically involves a movement that employs several techniques, simultaneously serving as a training tool for those techniques and the qualities relevant to fulfilling them. The property has component is used; it is designed to inherit the CIDOC-CRM declaration of P148 has component and to indicate the relationship between a form_movement and the technique(s) trained within.","name_en":"Shi","name_zh":"招式","other_name_en":"Form movement","other_name_zh":"式","parent_class":"training_method"},{"id":"Form_set","label":"Form_set","comment":"The class Form_set addresses the concept of form set (often referred to as form) -– the sequential arrangement of form movements. Commonly known as the Chinese term taolu and its Japanese equivalent, kata. An instance of Form_set features a set routine of multiple instances of Form_movement in sequential order. While most form sets are designed for individual practice, some also serve as interactive sparring exercises, represented through the class Sparring_set.","name_en":"Form set","name_zh":"套路","other_name_en":"Taolu","other_name_zh":"拳套","parent_class":"training_method"},{"id":"Interactive_system","label":"Interactive_system","comment":"A digital or physical interactive installation or system associated with a martial arts archive or exhibit. Subclass of E22 Man-Made Object.","parent_class":"E22_man_made_obj"},{"id":"MA_book","label":"MA_book","comment":"The class MA_book encompasses various types of books documenting aspects of martial arts; these include martial arts manuals, military treatises, ancient manuscripts, etc.","name_en":"Martial Arts Document","name_zh":"武術文檔","parent_class":"Physical_document"},{"id":"MA_clan","label":"MA_Clan","comment":"A martial arts clan is a patrilineal or discipleship lineage group founded around a specific master or family. Clans typically share training norms and honour codes and may maintain their own transmission records. Examples: Lam Family Hung Kuen, Hung Sing Choy Lay Fut.","name_en":"Martial Arts Clan","name_zh":"家族譜系","other_name_en":"Martial Arts Family","parent_class":"E74_Group"},{"id":"MA_edu_framework","label":"MA_edu_framework","name_en":"Martial Arts Educational framework","name_zh":"武術教學框架"},{"id":"MA_institute","label":"MA_Institute","comment":"MA_Institute represents social agents specifically involved in the activities of training, transmission, and assessment of martial arts, e.g. a school, clan, sect, or athletic association. Instances of this class typically have a physical location, represented by the property located at to relate to a place, accordingly subsuming the CIDOC-CRM assertions about E53 Place and P156 occupies.","name_en":"Martial Arts Institute","name_zh":"武術機構","parent_class":"MA_organization"},{"id":"MA_master","label":"MA_Master","comment":"The class MA_Master designates named human individuals recognized for their achievements in martial arts. Instances include historical practitioners, founders, and teachers. Concrete examples: Lam Sai Wing (林世榮). DISAMBIGUATION: A person's name is always MA_Master, NEVER MA_style or MA_system. The name of a whole art or tradition is MA_system. A lineage branch is MA_style.","name_en":"Martial Arts Masters","name_zh":"師傅","other_name_en":"Martial Artist","other_name_zh":"武術家","parent_class":"E21_Person"},{"id":"MA_organization","label":"MA_Organization","comment":"Any collective social agent involved in the administration, promotion, research, or governance of martial arts, for example national associations, competitive federations, and academic research bodies. Distinguished from MA_Institute, which is a dedicated teaching and transmission institution.","name_en":"Martial Arts Organization","name_zh":"武術組織","parent_class":"E74_Group"},{"id":"MA_principle","label":"MA_Principle","comment":"MA_principle pertains to the guiding principles that underlie the movement rationale of specific techniques or a style in general, typically varying among different martial arts styles and systems.","name_en":"Principle (martial arts)","name_zh":"理法","other_name_zh":"拳理","parent_class":"E73_Information_Object"},{"id":"MA_style","label":"MA_Style","comment":"The class MA_style conceptualizes a specific lineage, branch, or school WITHIN a martial arts system. Concrete examples: Lam Family Hung Kuen (林家洪拳), Yongchun White Crane (永春白鶴拳). DISAMBIGUATION: MA_style is a branch of an MA_system. A whole art like Hung Kuen is MA_system; a family lineage within it is MA_style. A person's name is never MA_style.","name_en":"Martial Arts Style","name_zh":"武術流派","other_name_zh":"武術風格"},{"id":"MA_syllabus","label":"MA_Syllabus","comment":"A formalised curriculum specifying which forms, techniques, and grading requirements constitute a complete course of study within a martial arts system or institute. Not all traditional systems have a standardised syllabus.","name_en":"Syllabus (martial arts)","name_zh":"武術課程大綱","parent_class":"MA_edu_framework"},{"id":"MA_system","label":"MA_System","comment":"The class MA_system represents an upper-level systemic grouping of different martial arts styles. A system is a whole tradition or art, not a single lineage. Concrete examples: Hung Kuen (洪拳), Choy Li Fut (蔡李佛), White Crane Kung Fu (白鶴拳), Southern Chinese Martial Arts (南拳), Chinese Martial Arts. Styles within a system typically share a consistent methodological framework and principles. DISAMBIGUATION: MA_system > MA_style > MA_Master. A person is never an MA_system. A named branch or family lineage is MA_style, not MA_system.","name_en":"Martial Arts System","name_zh":"武術系統"},{"id":"MA_tactic","label":"MA_Tactic","comment":"A tactical intent or combat application goal, describing what the practitioner is trying to achieve with a technique or movement. Examples: attacking while blocking (連消帶打), closing the distance (逼近), controlling the opponent (擒拿控制). Distinguished from MA_principle, which is a guiding movement philosophy rather than a combat objective.","name_en":"Tactic","name_zh":"戰術","parent_class":"E73_Information_Object"},{"id":"MA_technique","label":"MA_Technique","comment":"The class Technique is designed to function as a connector between different modules, establishing connections between general kinetic elements, technical interpretations, stylistic expressions, and methods of training, application, teaching, and documentation. This class expands four major categorical subclasses: Handwork, Footwork, Bodywork, and Bridge, each aiming o provide an embodied understanding of the techniques' structure. Accordingly, most instances of Technique are subsumed under one of the three principal categories given which anatomical part is substantially involved.","name_en":"Martial Arts Technique","name_zh":"技術"},{"id":"MA_verse","label":"MA_Verse","comment":"A mnemonic verse or oral formula (歌訣) encoding the key principles or movement sequences of a martial arts style or form. Passed down through oral tradition as a memory aid.","name_zh":"歌訣","parent_class":"E73_Information_Object"},{"id":"ManualBook","label":"ManualBook","comment":"A martial art manual, often called \\\"fight book\\\" is a practical, step-by-step instructional guide used to teach physical combat techniques.","name_en":"Manual","name_zh":"拳譜","other_name_en":"Fight Book","parent_class":"MA_book"},{"id":"Military_treatise","label":"Military_treatise","comment":"A military treatise is a high-level conceptual text focused on grand strategy, leadership, logistics, and organizational theory rather than individual fighting skills.","name_en":"Military treatise","name_zh":"军事论著","parent_class":"MA_book"},{"id":"MoCap_item","label":"MoCap_item","comment":"A motion-capture recording of martial arts movement.","parent_class":"Digital_document"},{"id":"Movie","label":"Movie","parent_class":"E73_Information_Object"},{"id":"Philosophical_concepts","label":"Philosophical_concepts","parent_class":"MA_principle"},{"id":"Physical_document","label":"Physical_document","comment":"A physical document resource associated with a martial arts entity.","name_en":"Physical document","parent_class":"E31_document"},{"id":"Preparation_pose","label":"Preparation_pose","name_zh":"預備勢","parent_class":"MA_technique"},{"id":"Rite","label":"Rite","comment":"A rite is a formal, prescribed ceremonial act or custom or event, often religious, traditional, or associated with milestones (e.g., weddings, graduations). A rite is different from a ritual, which denotes a sequence of actions or routine performed for symbolic value, hence an instance of E7.Activity.","name_en":"Rite","name_zh":"儀式","parent_class":"E5_Event"},{"id":"Textual_item","label":"Textual_item","comment":"A textual document or written source related to martial arts.","parent_class":"Digital_document"},{"id":"Traditional_event","label":"Traditional_event","comment":"A traditional event is a recurring social or cultural gathering (like a harvest festival or an annual parade) focused on celebration and community bonding.","name_en":"Traditional event","name_zh":"傳統活動","parent_class":"E5_Event"},{"id":"Video_item","label":"Video_item","comment":"A video recording documenting martial arts content.","parent_class":"Digital_document"},{"id":"Visual_item","label":"Visual_item","comment":"A photographic or graphic image document related to martial arts.","parent_class":"Digital_document"},{"id":"armament","label":"Weaponry","comment":"Weaponry (or Armament) is the umbrella term encompassing military weapons and equipment.","name_en":"Weaponry","name_zh":"兵器","other_name_en":"Armament","other_name_zh":"軍備","parent_class":"E22_man_made_obj"},{"id":"axe_weapon","label":"Axe_weapon","comment":"Axe and halberd-axe type weapons (斧, 鉞). Used for powerful chopping attacks.","name_en":"Axe weapon","name_zh":"斧鉞類","parent_class":"bladed_weapon"},{"id":"bladed_weapon","label":"Bladed_weapon","comment":"An edged or pointed weapon whose primary function depends on a blade. In Chinese martial arts, bladed weapons include swords (劍/刀), daggers, hooks, axes, and forks. Subclasses: sword_weapon, dagger_weapon, hook_weapon, axe_weapon, fork_weapon.","name_en":"Bladed weapon","name_zh":"刃器","parent_class":"armament"},{"id":"body_shape","label":"Body_shape","comment":"Body shape (身型) denotes a static or quasi-static overall configuration of the body used in attack, defence or transitional positioning — e.g. frontal body (正身), side body (侧身). Distinguished from bodywork (身法), which refers to dynamic body movement methods.","name_en":"Body shape","name_zh":"身型","parent_class":"bodywork"},{"id":"bodywork","label":"Bodywork","comment":"Bodywork signifies the nimble application of the body and accentuates a coherent yet flexible use of the waist and upper-body muscles.","name_en":"Bodywork","name_zh":"身法","parent_class":"MA_technique"},{"id":"bodywork_principle","label":"Bodywork_principle","name_zh":"身法原則","parent_class":"MA_principle"},{"id":"bow_weapon","label":"Bow_weapon","comment":"Bow, arrow, and crossbow weapons (弓箭弩). Mechanical ranged weapons that propel projectiles via stored tension. In Chinese martial arts and military history, includes the short bow (弓), crossbow (弩), and their arrows (箭). Distinct from projectile_weapon (暗器) which covers manually thrown weapons.","name_en":"Bow / Crossbow","name_zh":"弓箭弩類","parent_class":"armament"},{"id":"breath_principle","label":"Breathing_principle","name_zh":"呼吸法","parent_class":"MA_principle"},{"id":"breathing_tech","label":"Breathing_tech","comment":"breathing_tetch is the class for breathing techniques, a fundamental aspect of martial arts, as well as physical training and life in general. Proper breathing can enhance physical performance, force generation, and mindfulness.","name_en":"Breathing Technique","name_zh":"呼吸法","parent_class":"MA_technique"},{"id":"bridge_principle","label":"Bridge_principle","name_zh":"橋法","parent_class":"MA_principle"},{"id":"bridge_tech","label":"Bridge_tech","comment":"The class Bridge represent the concept of “bridge” or referred to as “bridge hand(s)” in traditional Chinese martial arts. The concept is particularly articulated in the Hung Kuen system. The term bridge means the connection between yourself and your opponent. The skill of bridge relates to the ability to manipulate one's own body structure, to control the ranges, amongst others.","name_en":"Bridge","name_zh":"橋法","other_name_en":"Bridge hand","parent_class":"MA_technique"},{"id":"claw_tech","label":"Claw_tech","comment":"Claw techniques denote the techniques that use the hand in the shape simulating an animal's claw (such as tiger, crane, etc), and are considered fierce and effective techniques that can result in serious damage.","name_en":"Claw technique","name_zh":"爪法","parent_class":"handwork"},{"id":"combo_tech","label":"Combo_tech","comment":"The class Combo_tech denotes a  technique combination, often addressed as combo tech, that is a combination of multiple others, typically involving movements in different body segments. Instances of such techniques acquire the identity of a combo technique with a collective impact of its technical components. To capture these characteristics, the employs property is used to indicate that a more complex instance of Technique is fulfilled by employing another or several other basic ones.","name_en":"Technique Combination","name_zh":"技術組合","other_name_en":"Combo Tech","parent_class":"MA_technique"},{"id":"dagger_weapon","label":"Dagger_weapon","comment":"Short bladed weapons including daggers and short knives (匕首, 短刀). Typically concealed or used in close-range combat.","name_en":"Dagger","name_zh":"匕首類","parent_class":"bladed_weapon"},{"id":"elbow_tech","label":"Elbow_tech","comment":"Elbow techniques denote the techniques that use the elbow joint, usually in tandem with coherent moves in the forearm.","name_en":"Elbow technique","name_zh":"踭法","name_romanCAN":"Zaang Faat","name_romanMAN":"Zhou Fa","other_name_zh":"肘法","parent_class":"handwork"},{"id":"empty_hand_set","label":"Empty_hand_set","comment":"A form set practised without weapons (bare-hand form).","name_en":"Empty-hand set","parent_class":"Form_set"},{"id":"eye_tech","label":"Eye_tech","comment":"Eye technique (眼法) refers to the discipline of eye-gaze direction and focus during combat or form execution, considered an integral part of coordinated body expression in many Chinese martial arts styles.","name_en":"Eye technique","name_zh":"眼法","parent_class":"MA_technique"},{"id":"finger_tech","label":"Finger_tech","comment":"Finger techniques denote techniques in which the extended finger(s) serve as the primary striking, thrusting, or deflecting tool. Common in Southern Chinese martial arts styles such as Choy Li Fut.","name_en":"Finger technique","name_zh":"指法","parent_class":"handwork"},{"id":"firearm","label":"Firearm","comment":"Gunpowder-propelled ranged weapons (火器). Historically relevant for Ming and Qing military martial arts texts. Distinguished from projectile_weapon (暗器) by reliance on combustion rather than manual propulsion.","name_en":"Firearm","name_zh":"火器類","parent_class":"armament"},{"id":"fist_tech","label":"Fist_tech","comment":"Fist techniques denote the techniques that use the hand in the fist shape, namely, with the fingers bent towards the palm. Fists are not necessarily held tightly, depending on which fist type is employed.","name_en":"Fist technique","name_zh":"拳法","parent_class":"handwork"},{"id":"flexible_weapon","label":"Flexible_weapon","comment":"Weapons with one or more flexible sections allowing whipping, entangling, or extended-range attacks (軟兵器). Examples: chain whip (九節鞭), three-section staff (三節棍), rope dart (流星錘).","name_en":"Flexible weapon","name_zh":"軟兵類","parent_class":"armament"},{"id":"footwork","label":"Footwork","comment":"Footwork is the umbrella term for techniques of the feet and legs in martial arts. It includes subclasses of static Stance or dynamic Leg_Tech.","name_en":"Footwork","name_zh":"脚法","other_name_zh":"步法","parent_class":"MA_technique"},{"id":"footwork_principle","label":"Footwork_principle","name_zh":"腳法原則","parent_class":"MA_principle"},{"id":"fork_weapon","label":"Fork_weapon","comment":"Fork and trident-type weapons with multiple bladed tines (叉, 鈀). Includes the steel trident (鋼叉) and iron rake (鐵耙).","name_en":"Fork weapon","name_zh":"叉鈀類","parent_class":"bladed_weapon"},{"id":"gesture","label":"Gesture","comment":"Deprecated class. Use mao:handshape instead."},{"id":"grading_system","label":"Grading_system","comment":"In martial arts, a grading system is the curriculum-based testing process a student undergoes to demonstrate their technical proficiency.","name_zh":"Grading system","parent_class":"MA_edu_framework"},{"id":"handshape","label":"Handshape","comment":"A handshape (or gesture) denotes the shape or status of the hand employed in a specific handwork.","name_en":"Handshape","name_zh":"手形","name_romanCAN":"Sau Jing","name_romanMAN":"Shou Xing","other_name_en":"Gesture","parent_class":"handwork"},{"id":"handwork","label":"Handwork","comment":"Handwork is the umbrella term for techniques of the hands and forearms in martial arts. It  encompass specific types of Palm_Tech, Fist_Tech, Claw_Tech, Elbow_Tech, and Gesture.","name_en":"Handwork","name_zh":"手法","parent_class":"MA_technique"},{"id":"handwork_principle","label":"Handwork_principle","name_zh":"手法原則","parent_class":"MA_principle"},{"id":"honor_code","label":"Honor_code","comment":"The ethical principles and behavioural codes upheld within a martial arts lineage or system, governing conduct between masters, students, and opponents. Examples include concepts of loyalty (忠), respect (禮), and righteousness (義).","name_zh":"價值原則","parent_class":"MA_principle"},{"id":"hook_weapon","label":"Hook_weapon","comment":"Hook-type weapons with curved bladed tips used for hooking, trapping, and slashing (鉤). Examples include tiger hooks (虎頭鉤) and war hooks (戰鉤).","name_en":"Hook weapon","name_zh":"鉤類","parent_class":"bladed_weapon"},{"id":"jumping_tech","label":"Jumping_tech","comment":"Jumping techniques involve propulsion of the body off the ground, typically combined with a kick, strike or evasion.","name_en":"Jumping technique","name_zh":"跳躍","parent_class":"leg_tech"},{"id":"kicking_tech","label":"Kicking_tech","comment":"Kicking techniques are a sub-type of leg technique in which the foot or lower leg strikes outward toward a target.","name_en":"Kicking technique","name_zh":"踢腿","parent_class":"leg_tech"},{"id":"leg_tech","label":"Leg_tech","comment":"Leg technique denotes the skills of the lower limbs in martial arts, primarily kicking attacks or kicking techniques.","name_en":"Leg technique","name_zh":"腿法","parent_class":"footwork"},{"id":"leg_training","label":"Leg_training","comment":"Conditioning exercises targeting the legs, including stretching, strengthening, and kicking drills.","name_en":"Leg training","name_zh":"腿部訓練","parent_class":"physical_training"},{"id":"palm_tech","label":"Palm_tech","comment":"Palm techniques, or open-hand strikes include various techniques used in martial arts to attack or defend without curling the hand into a fist.","name_en":"Palm technique","name_zh":"掌法","other_name_en":"Open-hand strike","parent_class":"handwork"},{"id":"physical_training","label":"Physical_training","comment":"Physical training encompasses systematic conditioning exercises used to develop the bodily qualities required for martial arts practice, including strength, flexibility, endurance, and coordination. It is distinct from form-based training (Form_set) and sparring, and typically constitutes the foundational preparation layer of a practitioner's regimen.","name_en":"Physical training","name_zh":"身體訓練","other_name_zh":"體能訓練","parent_class":"training_method"},{"id":"polearm_weapon","label":"Polearm_weapon","comment":"Long-shaft weapons whose primary function is reach and leverage. In Chinese martial arts, the long weapon category (長兵) includes the staff (棍) and spear (槍) as its principal subclasses.","name_en":"Polearm","name_zh":"長兵類","parent_class":"armament"},{"id":"prep_pose","label":"Prep_pose","comment":"A preparation or ready posture (预备势) is the initial or transitional stance/configuration assumed before or between technique sequences. It is not itself an offensive or defensive technique but provides a stable launch position.","name_en":"Preparation pose","name_zh":"預備勢","parent_class":"MA_technique"},{"id":"projectile_weapon","label":"Projectile_weapon","comment":"Weapons designed to be thrown or launched at a target (暗器). Includes throwing knives (飛刀), darts (鏢), and sleeve arrows (袖箭).","name_en":"Projectile weapon","name_zh":"暗器類","parent_class":"armament"},{"id":"ranking_system","label":"Ranking_system","comment":"A ranking system is the resulting hierarchical structure (like belts or certificates) used to classify that practitioner's overall level of knowledge, rank, and teaching ability within the art.","name_en":"Ranking system","name_zh":"段位系統","parent_class":"MA_edu_framework"},{"id":"shoulder_arm_training","label":"Shoulder_arm_training","comment":"Conditioning exercises targeting the shoulder joints and arms; a sub-type of physical training common in martial arts warm-up and conditioning regimens.","name_en":"Shoulder and arm training","name_zh":"肩臂训练","other_name_zh":"肩膊訓練","parent_class":"physical_training"},{"id":"spar_sequence","label":"Spar_sequence","comment":"A single performer's ordered sequence of Form_move instances within a sparring_set. One spar_sequence per person per side; the number of spar_sequence instances linked via hasSideA or hasSideB equals the number of persons on that side.","name_en":"Spar sequence","name_zh":"對拆序列","parent_class":"training_method"},{"id":"spar_training","label":"Sparring","comment":"Sparring is a form of training common to many combat sports and is considered the closest thing to a real fight without actually fighting. Usually, two persons are involved in sparring training, yet more is possible.","name_en":"Sparring","name_zh":"對練","parent_class":"training_method"},{"id":"sparring_set","label":"Sparring_set","comment":"A choreographed two-person sparring form set.","name_en":"Sparring set","name_zh":"對拆","parent_class":"Form_set"},{"id":"spear_weapon","label":"Spear_weapon","comment":"A spear-type polearm weapon characterised by a long shaft with a pointed head. In Chinese martial arts, spear weapons include the qiang (槍) and its variants, and are among the four classical weapons alongside the staff, sword, and sabre.","name_en":"Spear","name_zh":"槍類","parent_class":"polearm_weapon"},{"id":"staff_weapon","label":"Staff_weapon","comment":"A staff-type polearm weapon consisting of a long wooden or metal shaft without a blade. The staff (棍) is one of the four classical weapons of Chinese martial arts and appears in numerous styles as both an offensive and defensive tool.","name_en":"Staff","name_zh":"棍類","parent_class":"polearm_weapon"},{"id":"stance","label":"Stance","comment":"In martial arts, stances are the distribution, foot orientation and body positions (particularly the legs and torso) adopted when attacking, defending, advancing, or retreating.","name_en":"Stance","name_zh":"馬步","name_romanCAN":"Maa Bou","name_romanMAN":"Ma bu","parent_class":"footwork"},{"id":"sweeping_tech","label":"Sweeping_tech","comment":"Sweeping leg techniques involve a lateral or circular low leg movement intended to destabilise or unbalance an opponent.","name_en":"Sweeping technique","name_zh":"掃腿","parent_class":"leg_tech"},{"id":"sword_weapon","label":"Sword_weapon","comment":"Sword and sabre-type weapons. In Chinese martial arts, includes the double-edged straight sword (劍 jiàn) and the single-edged curved sabre (刀 dāo). Among the four classical weapons alongside the staff and spear.","name_en":"Sword / Sabre","name_zh":"劍刀類","parent_class":"bladed_weapon"},{"id":"symbolic_animal","label":"Symbolic_animal","comment":"Certain martial arts styles may associate themselves with one or multiple creatures or living things as symbols, indicated by the property has_symbol pointing to an instance of Symbolic_animal. It is widely held that many martial arts styles draw inspiration from the habits and moves of specific creatures like animals in designing their movement and tactical patterns. For example, the various Praying Mantis styles are inspired by the mantis (insect), and the White Crane kung fu imitates the crane (bird).","name_en":"Symbolic Animal","name_zh":"象徵動物","parent_class":"E77_persistent_item"},{"id":"training_method","label":"Training_method","comment":"The class Training_method encompasses methods created or adapted by a teaching master for learners to practice specific techniques while developing necessary physical qualities and comprehending the movement principles embedded. Instances of this class may feature a unitary exercise - a Form, or a series of exercises constituting a set - an instance of Form_set. While forms and form sets can vary significantly across styles and systems, they all serve training purposes. Another two categories of training methods crucial for developing martial arts skills are Physical_training and Sparring, both not codified. In any of these situations, the trains property is established to connect an instance of Training_method to one or more of Technique if the former contributes to the development of the latter.","name_en":"Training method","name_zh":"訓練方法","parent_class":"E73_Information_Object"},{"id":"training_tool","label":"Training_tool","comment":"Training tools refer to objects created to simulate a weapon - an entity of armament, or part of it, to train a specific technique or physical qualities. The property simulates is utilized to indicate a possible analogy.","name_en":"Training Tool","name_zh":"訓練工具","parent_class":"E22_man_made_obj"},{"id":"waist_training","label":"Waist_training","comment":"Conditioning exercises targeting the waist and core; critical in Chinese martial arts for developing rotational power (发腰).","name_en":"Waist training","name_zh":"腰部訓練","parent_class":"physical_training"},{"id":"weapon_set","label":"Weapon_set","comment":"A form set practised with weapons.","name_en":"Weapon set","parent_class":"Form_set"},{"id":"weapon_tech","label":"Weapon_tech","comment":"Weapon technique encompasses all martial arts techniques that involve the wielding, manipulation, or deployment of a weapon (an instance of armament) or its training surrogate (an instance of training_tool). This includes both classical Chinese weapons — the four major categories of staff (棍), spear (槍), sword/sabre (劍/刀), and their derivatives — and any style-specific implement. Weapon techniques are governed by the same structural principles as empty-hand techniques but extend the practitioner's reach, leverage, and force delivery. A weapon technique may employ one or both hands and is typically trained through dedicated form sets (weapon_set) or integrated into combined empty-hand/weapon routines.","name_en":"Weapon technique","name_zh":"兵器技術","parent_class":"MA_technique"}],"individuals":[{"id":"Book_Gung_Gee_Fook_Fu_Kuen_by_Lam_Sai_Wing","label":"Book:Gung_Gee_Fook_Fu_Kuen_by_Lam_Sai_Wing","primary_class":"ManualBook","documents":["Gung_Gee_Fook_Fu_Kuen"]},{"id":"Choy_Li_Fut","label":"Choy_Li_Fut","name_en":"Choy Li Fut","name_zh":"蔡李佛","other_name_en":"Choy Lei Fat","primary_class":"MA_system","belongs_to":["Southern_Chinese_Martial_Arts"]},{"id":"Dan_Tien_focus","label":"Dan_Tien_focus","name_en":"Dan Tien focus","name_zh":"氣沉丹田","primary_class":"breath_principle","used_in":["Choy_Li_Fut"]},{"id":"GungGee_video_OscarLam","label":"GungGee_video_OscarLam","primary_class":"Video_item"},{"id":"Gung_Gee_Fook_Fu_Kuen","label":"Gung_Gee_Fook_Fu_Kuen","name_en":"Gung Gee Fook Fu Kuen","name_zh":"工字伏虎拳","other_name_en":"Taming the Tiger in I-Pattern","primary_class":"empty_hand_set","belongs_to":["Hung_Kuen"],"practiced_in":["Lam_Family_Hung_Kuen"]},{"id":"Hung_Kuen","label":"Hung_Kuen","name_en":"Hung Kuen","name_zh":"洪拳","other_name_en":"Hung Gar,Hung Ga","other_name_zh":"洪家,洪家拳","primary_class":"MA_system","belongs_to":["Southern_Chinese_Martial_Arts"],"has_principle":["Dan_Tien_focus"],"has_symbol":["Snake"]},{"id":"Lam_Family_Hung_Kuen","label":"Lam_Family_Hung_Kuen","name_en":"Lam Family Hung Kuen","name_zh":"林家洪拳","primary_class":"MA_style","belongs_to":["Hung_Kuen"]},{"id":"Lam_Sai_Wing","label":"Lam_Sai_Wing","primary_class":"MA_master"},{"id":"Snake","label":"Snake","primary_class":"symbolic_animal"},{"id":"Southern_Chinese_Martial_Arts","label":"Southern_Chinese_Martial_Arts","name_en":"Southern Chinese Martial Arts","other_name_en":"Southern styles","other_name_zh":"南拳","primary_class":"MA_system"},{"id":"T_backfist_n_punch","label":"T_backfist_n_punch","name_en":"Side/reverse backfist block followed by a straight punch","name_zh":"品字掛打","name_romanCAN":"Ban Zi Gwaa Daa","name_romanMAN":"Pin Zi Gua Da","primary_class":"combo_tech","used_in":["Hung_Kuen"],"employs":["backfist_n_punch_combo"]},{"id":"Uprightness","label":"Uprightness","primary_class":"honor_code"},{"id":"White_Crane_Kungfu","label":"White_Crane_Kungfu","name_en":"White Crane Kungfu","name_zh":"白鶴拳","other_name_en":"White Crane Boxing","primary_class":"MA_system","belongs_to":["Southern_Chinese_Martial_Arts"],"has_principle":["Dan_Tien_focus"],"has_symbol":["white_crane"]},{"id":"Yin_Yang","label":"Yin_Yang","name_en":"Yin and Yang","name_zh":"陰陽","primary_class":"Philosophical_concepts"},{"id":"Yongchun_White_Crane","label":"Yongchun_White_Crane","name_en":"Yongchun_White_Crane","name_zh":"永春白鹤拳","other_name_en":"Fujian White Crane","primary_class":"MA_style","belongs_to":["White_Crane_Kungfu"]},{"id":"arm_lock","label":"arm_lock","name_en":"Arm lock","name_zh":"鎖臂","primary_class":"handwork","type_of":["joint_lock"]},{"id":"arm_lock_sweep","label":"arm_lock_sweep","name_en":"Arm lock and sweep","name_zh":"撥手掃脚","name_romanCAN":"But Sau Sou Goek","name_romanMAN":"Bo Shou Sao Jiao","primary_class":"combo_tech","used_in":["Hung_Kuen"],"employs":["arm_lock"]},{"id":"attack_int","label":"attack_int","name_en":"Launch an attack","name_zh":"攻擊","primary_class":"MA_tactic"},{"id":"attack_subduing","label":"attack_subdue","name_en":"Subduing","name_zh":"致命攻擊","primary_class":"MA_tactic"},{"id":"attack_while_defend","label":"attack_while_block","name_en":"Attacking while blocking","name_zh":"格打","primary_class":"MA_tactic"},{"id":"back_thrust_punch","label":"spiral_thrust_punch","comment":"手指弯曲紧扣，由下至上抛出去","name_en":"Spiral thrust punch","name_zh":"扯眼捶","name_romanCAN":"Ce Ngaan Ceoi","name_romanMAN":"Che Yan Chui","other_name_en":"Chet Yen Choy","primary_class":"fist_tech","used_in":["Choy_Li_Fut"],"employs":["spiral_arm"]},{"id":"backfist","label":"backfist","name_en":"Back fist","name_zh":"背拳","name_romanCAN":"Bui Kyun","name_romanMAN":"Bei Quan","primary_class":"handshape","used_in":["Choy_Li_Fut"]},{"id":"backfist_n_punch_combo","label":"backfist_n_punch_combo","name_en":"Backfist block followed by a straight punch","name_zh":"掛打","name_romanCAN":"Gwaa Daa","name_romanMAN":"Gua Da","primary_class":"combo_tech","used_in":["Choy_Li_Fut"],"employs":["body_twisting"]},{"id":"black_tiger_claw","label":"black_tiger_claw","name_en":"Black tiger claw","name_zh":"黑虎爪","name_romanCAN":"Hak Fu Zaau","name_romanMAN":"Hei Hu Zhao","primary_class":"claw_tech","used_in":["Hung_Kuen"],"employs":["tiger_claw"]},{"id":"blacktiger_punch","label":"blacktiger_punch","name_en":"The black-tiger punch combinition","name_romanCAN":"Hak Fu Ceoi","name_romanMAN":"Hei Hu Chui","other_name_en":"Side and reverse vertical fist punch combination","primary_class":"combo_tech","employs":["dbsquare_hammer"]},{"id":"blade_palm","label":"blade_palm","name_en":"Horizontal knife hand","name_zh":"標掌","name_romanCAN":"Biu Zoeng","name_romanMAN":"Biao Zhang","other_name_en":"Horizontal spearhand","primary_class":"handshape","used_in":["Hung_Kuen"]},{"id":"block_kick","label":"block_kick","name_en":"Leg block","name_zh":"消脚","name_romanCAN":"Siu Goek","name_romanMAN":"Xiao Jiao","other_name_zh":"吊脚馬","primary_class":"leg_tech","used_in":["Hung_Kuen"],"employs":["lifting_gravity_centere"]},{"id":"block_n_front_kick","label":"block_n_front_kick","name_en":"Blocking with groin stop kick","name_zh":"消脚撩陰腿","name_romanCAN":"Siu Goek Liu Jam Teoi","name_romanMAN":"Xiao Jiao Liao Yin Tui","primary_class":"leg_tech","used_in":["Hung_Kuen"],"employs":["block_kick"]},{"id":"blocking_palm","label":"blocking_palm","comment":"白鶴拳的膀手是如鶴翅一樣擋開攻勢。做這個手法時，前腳保持不動，後腳則要跟著身體轉動，帶動前手拋上，彈開對方的攻擊。","name_en":"Lower forearm block","name_zh":"膀手","name_romanCAN":"Bong Sau","name_romanMAN":"Bang Shou","other_name_en":"Bong Sau","primary_class":"palm_tech","used_in":["Hung_Kuen"],"employs":["tiger_claw"]},{"id":"blocking_palms","label":"cr_blocking_palms","name_en":"Blocking palms","name_zh":"抱牌","name_romanCAN":"Pou Paai","name_romanMAN":"Bao Pai","primary_class":"palm_tech","used_in":["White_Crane_Kungfu"],"similar_to":["butterfly_palm"]},{"id":"body_twisting","label":"waist_twist","name_en":"Waist twist","name_zh":"扭腰","name_romanCAN":"Nou Jiu","name_romanMAN":"Niu Yao","other_name_en":"Upper body twist","primary_class":"bodywork","used_in":["Choy_Li_Fut"]},{"id":"bouncing_kick","label":"bouncing_kick","name_en":"Bouncing kick","name_zh":"跳脚","name_romanCAN":"Tiu Goek","name_romanMAN":"Tiao Jiao","primary_class":"leg_tech","used_in":["White_Crane_Kungfu"]},{"id":"bow_stance","label":"bow_stance","comment":"其核心用途為進攻。在側身四平馬的基礎上，轉動盆骨和後腳，成子午馬，方便進攻時發力。做這個馬步時要避免前後兩腳踩在同一條直線上，這不但會影響盆骨的扭動，還會令人容易失去平衡。","name_en":"Bow stance","name_zh":"子午馬","name_romanCAN":"Zi Ng Maa","name_romanMAN":"Zi Wu Ma","other_name_en":"Forward stance","other_name_zh":"弓步","primary_class":"stance","used_in":["Choy_Li_Fut"]},{"id":"breath_regulation","label":"breath_control","name_en":"Breath control","name_zh":"調整呼吸，存氣蓄力","primary_class":"MA_tactic"},{"id":"breathing_in","label":"breathing_in","name_en":"Breathing in","name_zh":"吞","other_name_zh":"吸氣","primary_class":"breathing_tech"},{"id":"breathing_out","label":"breathing_out","name_en":"Breathing out","name_zh":"吐","other_name_zh":"呼氣","primary_class":"breathing_tech"},{"id":"brushing_palm","label":"brushing_palm","name_en":"Brushing palm","name_zh":"梳手","name_romanCAN":"So Sau","name_romanMAN":"Shu Shou","primary_class":"palm_tech","used_in":["White_Crane_Kungfu"]},{"id":"bullhorn_fist","label":"bull_horn_fist","name_en":"Bull horn fist","name_zh":"牛角拳","name_romanCAN":"Ngau Gok Kyun","name_romanMAN":"Niu Jiao Quan","other_name_en":"One knuckle fist","primary_class":"handshape","used_in":["Choy_Li_Fut"]},{"id":"bullhorn_punch","label":"h_bullhorn_punch","name_en":"Horizontal bull horn hammer fist","name_zh":"牛角搥","name_romanCAN":"Ngau Gok Ceoi","name_romanMAN":"Niu Jiao Chui","other_name_en":"Horizontal hook punch","other_name_zh":"橫涮搥","primary_class":"fist_tech","employs":["knocking_fis N":"Paau Ceoi","name_romanMAN":"Pao Chui","primary_class":"fist_tech","used_in":["Choy_Li_Fut"],"employs":["backfist"]},{"id":"throwing_palm","label":"throwing_palm","comment":"摔手分單摔手和橫摔手。做單摔手時要放鬆肩膊，利用身體重心轉移幫助發力。例如做右摔手時，應先將身體偏向左邊，繼而偏向右將重心移回中線，同時將手用力摔出去。做這個動作的時候可以想像成要將手上沾著的水甩走。橫摔手的動作形態像白鶴展翅。雙手打開時十指張開，注意手臂不要拉至膊頭後。手摔向兩旁時，鬆胯令身體向下沉。","name_en":"Throwing palm","name_zh":"摔手","name_romanCAN":"Seot Sau","name_romanMAN":"Shuai Shou","other_name_en":"Wrist Flicking Hand","primary_class":"palm_tech","used_in":["White_Crane_Kungfu"]},{"id":"thrust_punch","label":"thrust_punch","comment":"插捶是以直线向前方或斜下方刺去，握法是“姜子捶”。插捶分为阴阳两种，如直线发力插出称为阳捶，桥手扭曲旋转插 出称为阴捶。在实战中，阴阳循环形成不同角度攻击敌人上下不同部位。","name_en":"Thrust punch","name_zh":"插捶","name_romanCAN":"Caap Ceoi","name_romanMAN":"Cha Chui","primary_class":"fist_tech","used_in":["Choy_Li_Fut"],"employs":["fore_knuckle_fist"]},{"id":"thrusting_palm","label":"thrusting_palm","comment":"即以指尖插擊對方的太陽穴。以腰轉動帶動上肢，以弧形進攻。後手要完全放鬆並自然隨腰後。在攻擊瞬間脊柱要微曲，以加強攻擊力。","name_en":"Palm thrust","name_zh":"插掌","name_romanCAN":"Caap Zoeng","name_romanMAN":"Cha Zhang","other_name_en":"palm_thrust","other_name_zh":"扱手","primary_class":"palm_tech","used_in":["Choy_Li_Fut"],"employs":["reverse_palm"]},{"id":"tiger","label":"Tiger","primary_class":"symbolic_animal"},{"id":"tiger_claw","label":"tiger_claw","comment":"其做法有三种：①五指用力分展，第一二指节微屈，爪背屈紧，掌心成“凸”型。②拇指弯屈并紧扣于虎口处，其余四指并拢或微分卷屈\n第一二指关节，微屈腕关节。③五指分开，各指关节微屈，爪背微屈，掌心成“凹”型。","name_en":"Tiger claw","name_zh":"虎爪","name_romanCAN":"Fu Zaau","name_romanMAN":"Hu Zhao","primary_class":"claw_tech","used_in":["Choy_Li_Fut"],"employs":["claw_palm"]},{"id":"tiger_tail_kick","label":"tiger_tail_kick","comment":"虎尾腳是洪拳腳法之一，旨在攻擊對方腰部以下的位置。熟練動作後，前腳轉為外八字即可直接轉動腰胯踢腳。","name_en":"Tiger tail kick","name_zh":"虎尾脚","name_romanCAN":"Fu Mei Goek","name_romanMAN":"Hu Wei Jiao","other_name_en":"Side thrust kick","primary_class":"leg_tech","used_in":["Hung_Kuen"]},{"id":"torsion","label":"torsion","name_en":"torsion","name_zh":"扭轉發力","primary_class":"bodywork","employs nt":"The adapts property refers to the relation that a Master adapts certain (existing) techniques, training methods like forms and form sets, weapons, training tools, or even a style or system.","name_zh":"修改","domain":["MA_master"],"range_cls":["MA_style"],"symmetric":false,"transitive":false,"functional":false},{"id":"adopts","label":"adopts","comment":"The property adopts is essentially the verb adopt, signifying that a martial arts system or style adopts a training method, or a transmission institute or syllabus adopts a training method.","name_zh":"采用","domain":["MA_institute"],"range_cls":["training_method"],"symmetric":false,"transitive":false,"functional":false},{"id":"belongs_to","label":"belongs_to","domain":["MA_style"],"range_cls":["MA_system"],"symmetric":false,"transitive":true,"functional":false},{"id":"creates","label":"creates","comment":"The creates property refers to the relation that a Master creates certain (new) techniques, training methods like forms and form sets, weapons, training tools, or even a style or system.","name_zh":"創造","other_name_zh":"創建","domain":["MA_master"],"range_cls":["MA_style"],"symmetric":false,"transitive":false,"functional":false},{"id":"developed_from","label":"developed_from","domain":["MA_style"],"range_cls":["MA_style"],"symmetric":false,"transitive":false,"functional":false},{"id":"documents","label":"documents","name_zh":"記錄","domain":["MA_book"],"range_cls":["MA_institute"],"symmetric":false,"transitive":false,"functional":false},{"id":"employs","label":"employs","comment":"Instances of Techniques, particularly Combo_tech, acquire the identity of a combo technique with a collective impact of its technical components. To capture these characteristics, we use the employs property to indicate that a more complex instance of Technique is fulfilled by employing another or several other basic ones.","name_zh":"運用","domain":["MA_technique"],"range_cls":["MA_technique"],"symmetric":false,"transitive":true,"functional":false},{"id":"employsBodyshape","label":"employsBodyshape","comment":"Specifies the overall body configuration (身型) employed during a technique. Subproperty of mao:employs.","name_zh":"運用身形","domain":["MA_technique"],"range_cls":["body_shape"],"symmetric":false,"transitive":false,"functional":false},{"id":"employsGesture","label":"employs gesture","comment":"Deprecated property retained for backward compatibility. Use mao:employsHandshape instead.","symmetric":false,"transitive":false,"functional":false},{"id":"employsHandshape","label":"employs handshape","comment":"Specifies the handshape (手形) employed by a technique. Subproperty of mao:employs, narrowing the range to mao:handshape.","name_zh":"運用手形","domain":["MA_technique"],"range_cls":["handshape"],"symmetric":false,"transitive":false,"functional":false},{"id":"employsStance","label":"employsStance","comment":"Specifies the stance (步形) employed during a technique. Subproperty of mao:employs.","name_zh":"運用步形","domain":["MA_technique"],"range_cls":["stance"],"symmetric":false,"transitive":false,"functional":false},{"id":"features_in","label":"features_in","domain":["Form_move"],"range_cls":["Digital_document"],"symmetric":false,"transitive":false,"functional":false},{"id":"has","label":"has","domain":["MA_style"],"range_cls":["MA_style"],"symmetric":false,"transitive":false,"functional":false},{"id":"hasSideA","label":"hasSideA","comment":"Links a sparring_set to one or more spar_sequence instances on side A. Cardinality of this property equals the number of persons on side A.","name_zh":"甲方","domain":["sparring_set"],"range_cls":["spar_sequence"],"symmetric":false,"transitive":false,"functional":false},{"id":"hasSideB","label":"hasSideB","comment":"Links a sparring_set to one or more Spar_sequence instances on side B. Cardinality of this property equals the number of persons on side B.","name_zh":"乙方","domain":["sparring_set"],"range_cls":["spar_sequence"],"symmetric":false,"transitive":false,"functional":false function buildTpls(){const c=document.getElementById('maon-tpl-inner');let h='';for(const[g,items]of Object.entries(TPLS)){h+=`<h4>${g}</h4>`;items.forEach(([l])=>{h+=`<button class="maon-tpl-btn">${l}</button>`;});}c.innerHTML=h;let i=0;for(const[,items]of Object.entries(TPLS)){items.forEach(([,s])=>{c.querySelectorAll('.maon-tpl-btn')[i++].dataset.sql=s;});}c.addEventListener('click',e=>{const btn=e.target.closest('.maon-tpl-btn');if(btn&&btn.dataset.sql)MAonSQL.applyTpl(btn.dataset.sql);});}
function buildSchema(){const c=document.getElementById('maon-schema-inner');const sdef={individuals:{desc:"Named OWL individuals.",cols:[["id","TEXT PK","Local URI name"],["name_en","TEXT","English name"],["name_zh","TEXT","Chinese name"],["name_romanCAN","TEXT","Cantonese"],["name_romanMAN","TEXT","Mandarin"],["primary_class","TEXT","OWL class"],["used_in","JSON[]","mao:used_in"],["belongs_to","JSON[]","mao:belongs_to"],["employs","JSON[]","mao:employs"],["has_component","JSON[]","mao:has_component"],["similar_to","JSON[]","mao:similar_to"],["has_principle","JSON[]","mao:has_principle"],["archivist_note","TEXT","mao:archivist_note"],["origin_story","TEXT","mao:origin_story"]]},classes:{desc:"OWL classes.",cols:[["id","TEXT PK","Class name"],["label","TEXT","rdfs:label"],["comment","TEXT","Definition"],["name_zh","TEXT","Chinese name"],["parent_class","TEXT","rdfs:subClassOf"]]},object_properties:{desc:"OWL ObjectProperties.",cols:[["id","TEXT PK","Property name"],["domain","JSON[]","rdfs:domain"],["range_cls","JSON[]","rdfs:range"]]},relations:{desc:"Flattened edge table.",cols:[["subject","TEXT","Source"],["predicate","TEXT","Property"],["object","TEXT","Target"]]}};let h='<p style="font-size:11px;color:#666;margin-bottom:10px">JSON array columns: filter with LIKE \'%value%\'</p>';for(const[tn,td]of Object.entries(sdef)){const cnt=T[tn]?T[tn].length:'?';h+=`<h3>${tn} <span style="font-weight:normal;font-size:11px;color:#666">(${cnt} rows) — ${td.desc}</span></h3><table class="maon-stbl"><thead><tr><th>Column</th><th>Type</th><th>Description</th></tr></thead><tbody>`;td.cols.forEach(([c,t,d])=>{h+=`<tr><td>${c}</td><td>${t}</td><td>${d}</td></tr>`;});h+='</tbody></table>';}c.innerHTML=h;}
function buildHelp(){document.getElementById('maon-help-inner').innerHTML='<h3>Usage</h3><p>Embed this file in any HTML page and call <code>MAonSQL.open()</code> from a button or link. All data runs in-browser — no server needed.</p><h3>SQL syntax</h3><pre>SELECT col1, col2 FROM table\nWHERE condition\nORDER BY col [ASC|DESC]\nLIMIT n  OFFSET n</pre><p>Conditions: <code>=</code> <code>!=</code> <code>&lt;</code> <code>&gt;</code> <code>LIKE</code> <code>NOT LIKE</code> <code>IN(...)</code> <code>IS NULL</code> <code>IS NOT NULL</code> <code>AND</code> chains.</p><h3>JSON array columns</h3><p>used_in, belongs_to, employs, has_component, similar_to, type_of, has_principle, teaches, practiced_in are arrays. Filter: <code>WHERE used_in LIKE \'%Hung_Kuen%\'</code></p><h3>Hosting</h3><p>Static: upload the HTML file anywhere (GitHub Pages, Netlify, alongside your ontology page). Dynamic: run <code>datasette maon.db</code> for full SQL.</p>';}
function runSql(sql){
  let s=sql.trim().replace(/[ \t\r\n]+/g,' ');
  const m=s.match(/^SELECT\s+(.*?)\s+FROM\s+(\w+)(?:\s+WHERE\s+(.*?))?(?:\s+ORDER\s+BY\s+(.*?))?(?:\s+LIMIT\s+(\d+))?(?:\s+OFFSET\s+(\d+))?;?$/i);
  if(!m)throw new Error('Only SELECT … FROM table [WHERE …] [ORDER BY …] [LIMIT n] supported.');
  let[,cols,tbl,wh,ord,lim,off]=m;tbl=tbl.toLowerCase();
  if(!T[tbl])throw new Error('Unknown table "'+tbl+'". Available: '+Object.keys(T).join(', '));
  let rows=[...T[tbl]];
  if(wh)rows=applyWhere(rows,wh.trim());
  if(ord)rows=applyOrder(rows,ord.trim());
  if(off)rows=rows.slice(+off);rows=rows.slice(0,lim?+lim:200);
  const clist=cols.trim()==='*'?(()=>{const ks=new Set();T[tbl].forEach(r=>Object.keys(r).forEach(k=>ks.add(k)));return[...ks].map(k=>({e:k,a:null}));})():cols.split(',').map(c=>{c=c.trim();const am=c.match(/^(.*?)\s+AS\s+(\w+)$/i);return am?{e:am[1].trim(),a:am[2]}:{e:c,a:null};});
  return{columns:clist.map(c=>c.a||c.e),rows:rows.map(r=>clist.map(c=>evalExpr(c.e,r)))};
}
function evalExpr(expr,row){expr=expr.trim();if(/^'[^']*'$/.test(expr))return expr.slice(1,-1);const um=expr.match(/^UPPER\((\w+)\)$/i);if(um)return row[um[1]]?String(row[um[1]]).toUpperCase():null;const lm=expr.match(/^LOWER\((\w+)\)$/i);if(lm)return row[lm[1]]?String(row[lm[1]]).toLowerCase():null;const cm=expr.match(/^COALESCE\((.+)\)$/i);if(cm)return cm[1].split(',').map(e=>evalExpr(e.trim(),row)).find(v=>v!=null)??null;return row.hasOwnProperty(expr)?(row[expr]!==undefined?row[expr]:null):null;}
function splitAnd(c){const p=[];let d=0,s=0,u=c.toUpperCase();for(let i=0;i<c.length-3;i++){if(c[i]==='(')d++;else if(c[i]===')') d--;else if(d===0&&u.slice(i,i+5)===' AND '){p.push(c.slice(s,i));s=i+5;i+=4;}}p.push(c.slice(s));return p;}
function evalCond(cond,row){let m;m=cond.match(/^(\w+)\s+IS\s+NOT\s+NULL$/i);if(m)return row[m[1]]!=null&&row[m[1]]!==undefined;m=cond.match(/^(\w+)\s+IS\s+NULL$/i);if(m)return row[m[1]]==null||row[m[1]]===undefined;m=cond.match(/^(\w+)\s+(NOT\s+)?LIKE\s+'([^']+)'$/i);if(m){const v=String(row[m[1]]||'').toLowerCase(),neg=!!m[2],pat=m[3].toLowerCase().replace(/%/g,'.*').replace(/_/g,'.'),ok=new RegExp('^'+pat+'$').test(v);return neg?!ok:ok;}m=cond.match(/^(\w+)\s+(NOT\s+)?IN\s+\(([^)]+)\)$/i);if(m){const neg=!!m[2],vals=m[3].split(',').map(v=>v.trim().replace(/^'|'$/g,'')),ok=vals.includes(String(row[m[1]]||''));return neg?!ok:ok;}m=cond.match(/^(\w+)\s*(=|!=|<>|>=|<=|>|<)\s*'([^']*)'$/);if(m){const rv=String(row[m[1]]||'').toLowerCase(),v=m[3].toLowerCase();switch(m[2]){case'=':return rv===v;case'!=':case'<>':return rv!==v;case'>':return rv>v;case'<':return rv<v;case'>=':return rv>=v;case'<=':return rv<=v;}}m=cond.match(/^(\w+)\s*(=|!=|<>|>=|<=|>|<)\s*(-?\d+(\.\d+)?)$/);if(m){const rv=parseFloat(row[m[1]]),v=parseFloat(m[3]);if(!isNaN(rv)){switch(m[2]){case'=':return rv===v;case'!=':case'<>':return rv!==v;case'>':return rv>v;case'<':return rv<v;case'>=':return rv>=v;case'<=':return rv<=v;}}}return true;}
function splitOr(c){const p=[];let d=0,s=0,u=c.toUpperCase();for(let i=0;i<c.length-3;i++){if(c[i]==='(')d++;else if(c[i]===')')d--;else if(d===0&&u.slice(i,i+4)===' OR '){p.push(c.slice(s,i));s=i+4;i+=3;}}p.push(c.slice(s));return p;}
function applyWhere(rows,clause){return rows.filter(r=>splitOr(clause).some(op=>splitAnd(op.trim()).every(c=>evalCond(c.trim(),r))));}
function applyOrder(rows,clause){const parts=clause.split(',').map(p=>{const m=p.trim().match(/^(\w+)\s*(ASC|DESC)?$/i);return m?{col:m[1],dir:(m[2]||'ASC').toUpperCase()}:null;}).filter(Boolean);return[...rows].sort((a,b)=>{for(const{col,dir}of parts){const av=a[col],bv=b[col];if(av==null)return 1;if(bv==null)return-1;const c=String(av).localeCompare(String(bv),undefined,{numeric:true});if(c!==0)return dir==='DESC'?-c:c;}return 0;});}
function isZh(s){return/[\u4e00-\u9fff]/.test(s);}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function renderResults(result,elapsed){
  const{columns,rows}=result;const el=document.getElementById('maon-results');
  let h=`<div class="maon-results-meta">${rows.length} row${rows.length!==1?'s':''} &nbsp;&middot;&nbsp; ${elapsed}ms &nbsp;&middot;&nbsp; ${columns.length} columns</div>`;
  if(!rows.length){el.innerHTML=h+'<div style="color:#888;font-size:12px">No results.</div>';return;}
  h+='<div class="maon-table-wrap"><table class="maon-table"><thead><tr>';
  columns.forEach(c=>h+=`<th>${esc(c)}</th>`);h+='</tr></thead><tbody>';
  rows.forEach(row=>{h+='<tr>';row.forEach((cell,i)=>{const col=columns[i];if(cell===null||cell===undefined){h+='<td class="maon-null">&#8212;</td>';}else if(Array.isArray(cell)){h+=`<td>${cell.map(v=>`<span class="maon-tag" onclick="MAonSQL.inject('${esc(v)}')">${esc(v)}</span>`).join('')}</td>`;}else if(typeof cell==='string'&&cell.startsWith('[')){try{const arr=(cell&&cell!=='[]')?JSON.parse(cell):[];h+=`<td>${arr.length?arr.map(v=>`<span class="maon-tag" onclick="MAonSQL.inject('${esc(v)}')">${esc(v)}</span>`).join(''):'<span class="maon-null">[]</span>'}</td>`;}catch{h+=`<td class="${isZh(cell)?'maon-zh':''}">${esc(cell)}</td>`;}}else if(col==='primary_class'||col==='parent_class'){h+=`<td><span class="maon-tag" onclick="MAonSQL.queryClass('${esc(cell)}')">${esc(cell)}</span></td>`;}else if(col==='id'||col==='subject'||col==='object'){h+=`<td><a href="#" style="color:#00c" onclick="MAonSQL.queryId('${esc(cell)}');return false">${esc(cell)}</a></td>`;}else{h+=`<td class="${isZh(String(cell))?'maon-zh':''}">${esc(String(cell))}</td>`;}});h+='</tr>';});
  h+='</tbody></table></div>';el.innerHTML=h;
}
window.MAonSQL={
  open(){document.getElementById('maon-overlay').classList.add('open');},
  close(){document.getElementById('maon-overlay').classList.remove('open');},
  tab(name){document.querySelectorAll('.maon-tab').forEach(t=>t.classList.remove('active'));document.querySelectorAll('.maon-view').forEach(v=>v.classList.remove('active'));const idx=['query','templates','schema','help'].indexOf(name);document.querySelectorAll('.maon-tab')[idx].classList.add('active');['maon-view-query','maon-view-tpl','maon-view-schema','maon-view-help'].forEach((id,i)=>{if(i===idx)document.getElementById(id).classList.add('active');});},
  run(){const sql=document.getElementById('maon-sql-input').value.trim();const el=document.getElementById('maon-results');if(!sql)return;const t0=performance.now();try{const r=runSql(sql);renderResults(r,(performance.now()-t0).toFixed(1));}catch(err){el.innerHTML=`<div class="maon-error">Error: ${esc(err.message)}</div>`;}},

};
